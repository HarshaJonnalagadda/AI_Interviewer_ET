<!DOCTYPE html>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#000;font-family:var(--font-sans)}

.stage{
  background:#000;
  min-height:600px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  position:relative;
  overflow:hidden;
  padding:2rem 1rem;
}

/* Grid overlay */
.grid-bg{
  position:absolute;inset:0;
  background-image:
    linear-gradient(rgba(200,165,90,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(200,165,90,0.04) 1px, transparent 1px);
  background-size:32px 32px;
  pointer-events:none;
}

/* Ambient glow blobs */
.glow-blob{
  position:absolute;border-radius:50%;
  filter:blur(60px);pointer-events:none;
  animation:blobDrift 8s ease-in-out infinite;
}
@keyframes blobDrift{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(8px,-12px) scale(1.08)}}

/* ── BOT ── */
.bot-wrap{
  position:relative;
  width:200px;height:200px;
  display:flex;align-items:center;justify-content:center;
  margin-bottom:1.5rem;
  cursor:pointer;
}

/* Shadow beneath bot */
.bot-shadow{
  position:absolute;bottom:-14px;left:50%;transform:translateX(-50%);
  width:110px;height:16px;
  background:radial-gradient(ellipse,rgba(200,165,90,0.25) 0%,transparent 70%);
  border-radius:50%;
  animation:shadowPulse 2.5s ease-in-out infinite;
}
@keyframes shadowPulse{0%,100%{opacity:0.6;width:110px}50%{opacity:1;width:130px}}

/* Bot body — 3D pill shape */
.bot-body{
  width:140px;height:120px;
  background:linear-gradient(145deg,#1a1108 0%,#0a0805 50%,#000 100%);
  border-radius:36px;
  border:1.5px solid rgba(200,165,90,0.35);
  position:relative;
  box-shadow:
    0 0 0 1px rgba(200,165,90,0.1),
    0 8px 32px rgba(0,0,0,0.8),
    inset 0 1px 0 rgba(200,165,90,0.15),
    inset 0 -1px 0 rgba(0,0,0,0.5);
  animation:botFloat 3s ease-in-out infinite;
  transform-style:preserve-3d;
}
@keyframes botFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}

/* Face screen inside body */
.bot-screen{
  position:absolute;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  width:108px;height:82px;
  background:#050505;
  border-radius:18px;
  border:1px solid rgba(200,165,90,0.2);
  overflow:hidden;
  display:flex;align-items:center;justify-content:center;
}

/* Screen grid */
.screen-grid{
  position:absolute;inset:0;
  background-image:
    linear-gradient(rgba(200,165,90,0.06) 1px,transparent 1px),
    linear-gradient(90deg,rgba(200,165,90,0.06) 1px,transparent 1px);
  background-size:10px 10px;
}

/* EYES */
.eyes{position:absolute;display:flex;gap:16px;top:18px;left:50%;transform:translateX(-50%)}
.eye{
  width:22px;height:20px;
  background:#c8a55a;
  border-radius:4px;
  position:relative;
  animation:eyeBlink 4s ease-in-out infinite;
  box-shadow:0 0 10px rgba(200,165,90,0.6);
}
.eye::after{
  content:'';position:absolute;
  top:3px;left:3px;
  width:8px;height:8px;
  background:rgba(255,255,255,0.9);
  border-radius:2px;
}
@keyframes eyeBlink{0%,90%,100%{transform:scaleY(1)}95%{transform:scaleY(0.05)}}

/* MOUTH */
.mouth{
  position:absolute;
  bottom:14px;left:50%;transform:translateX(-50%);
  width:28px;height:6px;
  background:#c8a55a;
  border-radius:3px;
  box-shadow:0 0 8px rgba(200,165,90,0.5);
  transition:all 0.3s ease;
}

/* ANTENNAE */
.antenna{
  position:absolute;top:-28px;
  width:6px;
  background:linear-gradient(180deg,rgba(200,165,90,0.8),rgba(200,165,90,0.3));
  border-radius:3px;
}
.antenna-left{left:28px;height:22px;transform:rotate(-12deg)}
.antenna-right{right:28px;height:18px;transform:rotate(12deg)}
.antenna-tip{
  width:10px;height:10px;border-radius:50%;
  background:#c8a55a;
  position:absolute;top:-5px;left:50%;transform:translateX(-50%);
  box-shadow:0 0 12px rgba(200,165,90,0.9);
  animation:tipGlow 2s ease-in-out infinite;
}
@keyframes tipGlow{0%,100%{opacity:0.7;box-shadow:0 0 8px rgba(200,165,90,0.7)}50%{opacity:1;box-shadow:0 0 16px rgba(200,165,90,1)}}

/* EARS / side buttons */
.ear{
  position:absolute;top:50%;transform:translateY(-50%);
  width:10px;height:28px;
  background:linear-gradient(180deg,rgba(200,165,90,0.6),rgba(200,165,90,0.2));
  border-radius:4px;
  border:1px solid rgba(200,165,90,0.3);
}
.ear-left{left:-12px;border-radius:4px 2px 2px 4px}
.ear-right{right:-12px;border-radius:2px 4px 4px 2px}

/* Bottom accent strip */
.bot-strip{
  position:absolute;bottom:0;left:16px;right:16px;height:3px;
  background:linear-gradient(90deg,transparent,rgba(200,165,90,0.5),rgba(200,165,90,0.8),rgba(200,165,90,0.5),transparent);
  border-radius:0 0 36px 36px;
}

/* ── BOT NAME ── */
.bot-name{
  font-size:22px;font-weight:500;
  color:#c8a55a;
  letter-spacing:0.12em;
  margin-bottom:4px;
}
.bot-sub{
  font-size:11px;color:rgba(200,165,90,0.4);
  letter-spacing:0.2em;text-transform:uppercase;
  margin-bottom:2rem;
}

/* ── STATE PILLS ── */
.state-row{display:flex;gap:8px;margin-bottom:2rem;flex-wrap:wrap;justify-content:center}
.state-pill{
  font-size:11px;font-weight:500;
  padding:5px 14px;border-radius:99px;
  border:1px solid;cursor:pointer;
  transition:all 0.2s;
  letter-spacing:0.05em;
}
.state-pill:hover{transform:scale(1.04)}
.s-idle{color:rgba(200,165,90,0.7);border-color:rgba(200,165,90,0.3);background:rgba(200,165,90,0.05)}
.s-idle.active,s-idle:hover{background:rgba(200,165,90,0.15);border-color:rgba(200,165,90,0.7)}
.s-listen{color:rgba(29,158,117,0.8);border-color:rgba(29,158,117,0.3);background:rgba(29,158,117,0.05)}
.s-listen.active{background:rgba(29,158,117,0.15);border-color:rgba(29,158,117,0.8)}
.s-think{color:rgba(127,119,221,0.8);border-color:rgba(127,119,221,0.3);background:rgba(127,119,221,0.05)}
.s-think.active{background:rgba(127,119,221,0.15);border-color:rgba(127,119,221,0.8)}
.s-speak{color:rgba(55,138,221,0.8);border-color:rgba(55,138,221,0.3);background:rgba(55,138,221,0.05)}
.s-speak.active{background:rgba(55,138,221,0.15);border-color:rgba(55,138,221,0.8)}
.s-reveal{color:rgba(216,90,48,0.8);border-color:rgba(216,90,48,0.3);background:rgba(216,90,48,0.05)}
.s-reveal.active{background:rgba(216,90,48,0.15);border-color:rgba(216,90,48,0.8)}

/* ── WAVEFORM ── */
.wave-wrap{
  display:flex;align-items:center;gap:2px;height:32px;margin-bottom:1.5rem;
  opacity:0;transition:opacity 0.4s;
}
.wave-wrap.visible{opacity:1}
.wbar{
  width:3px;border-radius:2px;background:#c8a55a;
  animation:waveAnim 1s ease-in-out infinite;
  min-height:3px;
}
@keyframes waveAnim{0%,100%{transform:scaleY(1)}50%{transform:scaleY(var(--s,3))}}

/* ── QUESTION CARD ── */
.q-card{
  width:100%;max-width:400px;
  background:rgba(10,8,5,0.9);
  border:1px solid rgba(200,165,90,0.2);
  border-radius:16px;
  padding:1.25rem 1.5rem;
  position:relative;
  overflow:hidden;
}
.q-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(200,165,90,0.5),transparent);
}
.q-label{font-size:10px;letter-spacing:0.15em;color:rgba(200,165,90,0.45);margin-bottom:8px;text-transform:uppercase}
.q-text{
  font-size:15px;color:rgba(255,255,255,0.85);line-height:1.6;
  min-height:44px;
}
.q-cursor{
  display:inline-block;width:2px;height:16px;
  background:#c8a55a;margin-left:2px;vertical-align:text-bottom;
  animation:qBlink 0.9s step-end infinite;
}
@keyframes qBlink{0%,100%{opacity:1}50%{opacity:0}}

/* ── STATUS BAR ── */
.status-bar{
  width:100%;max-width:400px;
  display:flex;align-items:center;justify-content:space-between;
  padding:0.75rem 1rem;
  border:1px solid rgba(200,165,90,0.12);
  border-radius:10px;
  margin-top:1rem;
  background:rgba(200,165,90,0.03);
}
.status-left{display:flex;align-items:center;gap:8px}
.status-dot{width:6px;height:6px;border-radius:50%;animation:statusPulse 2s ease-in-out infinite}
@keyframes statusPulse{0%,100%{opacity:0.6;transform:scale(1)}50%{opacity:1;transform:scale(1.3)}}
.status-text{font-size:11px;letter-spacing:0.08em;color:rgba(200,165,90,0.6);text-transform:uppercase}
.status-right{font-size:11px;color:rgba(200,165,90,0.3);font-family:var(--font-mono)}

/* ── LIGHT MODE ── */
.light-toggle{
  position:absolute;top:1.5rem;right:1.5rem;
  font-size:11px;padding:4px 12px;
  border-radius:99px;
  border:1px solid rgba(200,165,90,0.3);
  background:rgba(200,165,90,0.08);
  color:rgba(200,165,90,0.6);
  cursor:pointer;
  transition:all 0.3s;
  z-index:10;
}

/* Light mode overrides */
.stage.light-mode{background:#faf8f3}
.stage.light-mode .grid-bg{
  background-image:
    linear-gradient(rgba(107,78,26,0.06) 1px,transparent 1px),
    linear-gradient(90deg,rgba(107,78,26,0.06) 1px,transparent 1px);
  background-size:32px 32px;
}
.stage.light-mode .bot-body{
  background:linear-gradient(145deg,#fdf6e8 0%,#f5e9cc 50%,#ede0b5 100%);
  border-color:rgba(107,78,26,0.3);
  box-shadow:0 8px 32px rgba(107,78,26,0.15),inset 0 1px 0 rgba(255,255,255,0.8);
}
.stage.light-mode .bot-screen{background:#fff8e8;border-color:rgba(107,78,26,0.2)}
.stage.light-mode .screen-grid{
  background-image:
    linear-gradient(rgba(107,78,26,0.06) 1px,transparent 1px),
    linear-gradient(90deg,rgba(107,78,26,0.06) 1px,transparent 1px);
  background-size:10px 10px;
}
.stage.light-mode .eye{background:#6b4e1a;box-shadow:0 0 10px rgba(107,78,26,0.3)}
.stage.light-mode .eye::after{background:rgba(255,255,255,0.95)}
.stage.light-mode .mouth{background:#6b4e1a;box-shadow:none}
.stage.light-mode .bot-name{color:#6b4e1a}
.stage.light-mode .bot-sub{color:rgba(107,78,26,0.4)}
.stage.light-mode .antenna{background:linear-gradient(180deg,rgba(107,78,26,0.8),rgba(107,78,26,0.2))}
.stage.light-mode .antenna-tip{background:#6b4e1a;box-shadow:0 0 8px rgba(107,78,26,0.4)}
.stage.light-mode .ear{background:linear-gradient(180deg,rgba(107,78,26,0.4),rgba(107,78,26,0.1));border-color:rgba(107,78,26,0.2)}
.stage.light-mode .bot-strip{background:linear-gradient(90deg,transparent,rgba(107,78,26,0.3),rgba(107,78,26,0.6),rgba(107,78,26,0.3),transparent)}
.stage.light-mode .bot-shadow{background:radial-gradient(ellipse,rgba(107,78,26,0.2) 0%,transparent 70%)}
.stage.light-mode .q-card{background:rgba(255,252,244,0.95);border-color:rgba(107,78,26,0.2)}
.stage.light-mode .q-card::before{background:linear-gradient(90deg,transparent,rgba(107,78,26,0.3),transparent)}
.stage.light-mode .q-label{color:rgba(107,78,26,0.5)}
.stage.light-mode .q-text{color:rgba(30,20,5,0.8)}
.stage.light-mode .q-cursor{background:#6b4e1a}
.stage.light-mode .status-bar{background:rgba(107,78,26,0.03);border-color:rgba(107,78,26,0.12)}
.stage.light-mode .status-text{color:rgba(107,78,26,0.6)}
.stage.light-mode .status-right{color:rgba(107,78,26,0.3)}
.stage.light-mode .wbar{background:#6b4e1a}
.stage.light-mode .light-toggle{color:rgba(107,78,26,0.7);border-color:rgba(107,78,26,0.3)}
.stage.light-mode .s-idle{color:rgba(107,78,26,0.7);border-color:rgba(107,78,26,0.3);background:rgba(107,78,26,0.05)}
</style>

<div class="stage" id="stage">
  <div class="grid-bg"></div>
  <div class="glow-blob" style="width:300px;height:300px;background:rgba(200,165,90,0.04);top:-80px;left:-60px;animation-delay:0s"></div>
  <div class="glow-blob" style="width:200px;height:200px;background:rgba(127,119,221,0.04);bottom:-40px;right:-40px;animation-delay:3s"></div>

  <button class="light-toggle" onclick="toggleMode()" id="modeBtn">☀ Light</button>

  <!-- BOT -->
  <div class="bot-wrap" onclick="cycleState()" title="Click to cycle states">
    <div class="bot-shadow"></div>
    <div class="bot-body" id="botBody">
      <div class="antenna antenna-left"><div class="antenna-tip"></div></div>
      <div class="antenna antenna-right"><div class="antenna-tip" style="animation-delay:0.7s"></div></div>
      <div class="ear ear-left"></div>
      <div class="ear ear-right"></div>
      <div class="bot-screen">
        <div class="screen-grid"></div>
        <div class="eyes" id="eyes">
          <div class="eye" id="eyeL"></div>
          <div class="eye" id="eyeR"></div>
        </div>
        <div class="mouth" id="mouth"></div>
      </div>
      <div class="bot-strip"></div>
    </div>
  </div>

  <div class="bot-name">sc·ai</div>
  <div class="bot-sub">Star Canvas · Cinema Intelligence</div>

  <!-- STATE PILLS -->
  <div class="state-row">
    <div class="state-pill s-idle active" id="pill-idle" onclick="setState('idle')">⊙ Idle</div>
    <div class="state-pill s-listen" id="pill-listen" onclick="setState('listen')">◉ Listening</div>
    <div class="state-pill s-think" id="pill-think" onclick="setState('think')">⟳ Thinking</div>
    <div class="state-pill s-speak" id="pill-speak" onclick="setState('speak')">▶ Speaking</div>
    <div class="state-pill s-reveal" id="pill-reveal" onclick="setState('reveal')">✦ Reveal</div>
  </div>

  <!-- WAVEFORM -->
  <div class="wave-wrap" id="waveWrap">
    <div class="wbar" style="--s:1.5;animation-delay:0s"></div>
    <div class="wbar" style="--s:3;animation-delay:0.1s"></div>
    <div class="wbar" style="--s:4;animation-delay:0.15s"></div>
    <div class="wbar" style="--s:2.5;animation-delay:0.2s"></div>
    <div class="wbar" style="--s:5;animation-delay:0.25s"></div>
    <div class="wbar" style="--s:3.5;animation-delay:0.3s"></div>
    <div class="wbar" style="--s:4.5;animation-delay:0.35s"></div>
    <div class="wbar" style="--s:2;animation-delay:0.4s"></div>
    <div class="wbar" style="--s:3;animation-delay:0.45s"></div>
    <div class="wbar" style="--s:4;animation-delay:0.5s"></div>
    <div class="wbar" style="--s:1.5;animation-delay:0.55s"></div>
    <div class="wbar" style="--s:3.5;animation-delay:0.6s"></div>
    <div class="wbar" style="--s:5;animation-delay:0.65s"></div>
    <div class="wbar" style="--s:2.5;animation-delay:0.7s"></div>
    <div class="wbar" style="--s:3;animation-delay:0.75s"></div>
  </div>

  <!-- QUESTION CARD -->
  <div class="q-card" id="qCard">
    <div class="q-label">Question 3 of 7</div>
    <div class="q-text" id="qText">
      If you could take one prop from this film home forever — what would it be and why?<span class="q-cursor"></span>
    </div>
  </div>

  <!-- STATUS BAR -->
  <div class="status-bar">
    <div class="status-left">
      <div class="status-dot" id="statusDot" style="background:#c8a55a"></div>
      <span class="status-text" id="statusText">Idle · Waiting</span>
    </div>
    <span class="status-right" id="statusRight">Paradise · Telugu</span>
  </div>
</div>

<script>
const states = {
  idle: {
    pill:'pill-idle',
    eyeW:'22px',eyeH:'20px',eyeRadius:'4px',eyeColor:'',
    mouthW:'28px',mouthH:'6px',mouthRadius:'3px',mouthColor:'',
    waveVisible:false,
    dotColor:'#c8a55a',
    statusText:'Idle · Waiting',
    q:'If you could take one prop from this film home forever — what would it be and why?',
    bodyFilter:'',
    eyeAnim:'eyeBlink 4s ease-in-out infinite',
    mouthAnim:'none'
  },
  listen: {
    pill:'pill-listen',
    eyeW:'26px',eyeH:'24px',eyeRadius:'50%',eyeColor:'#1d9e75',
    mouthW:'14px',mouthH:'14px',mouthRadius:'50%',mouthColor:'#1d9e75',
    waveVisible:true,waveColor:'#1d9e75',
    dotColor:'#1d9e75',
    statusText:'Listening · Recording',
    q:'Listening to your answer...',
    eyeAnim:'none',mouthAnim:'none'
  },
  think: {
    pill:'pill-think',
    eyeW:'22px',eyeH:'8px',eyeRadius:'4px',eyeColor:'#7f77dd',
    mouthW:'20px',mouthH:'4px',mouthRadius:'2px',mouthColor:'#7f77dd',
    waveVisible:false,
    dotColor:'#7f77dd',
    statusText:'Thinking · Processing',
    q:'Analysing your answer and crafting the next question...',
    eyeAnim:'none',mouthAnim:'none'
  },
  speak: {
    pill:'pill-speak',
    eyeW:'22px',eyeH:'20px',eyeRadius:'4px',eyeColor:'',
    mouthW:'32px',mouthH:'10px',mouthRadius:'5px',mouthColor:'',
    waveVisible:true,waveColor:'',
    dotColor:'#378add',
    statusText:'Speaking · AI Response',
    q:'That\'s a beautiful answer. The prop becomes the film\'s soul — the audience will feel exactly what you felt.',
    eyeAnim:'eyeBlink 2s ease-in-out infinite',
    mouthAnim:'mouthTalk 0.4s ease-in-out infinite'
  },
  reveal: {
    pill:'pill-reveal',
    eyeW:'28px',eyeH:'28px',eyeRadius:'50%',eyeColor:'#d85a30',
    mouthW:'40px',mouthH:'8px',mouthRadius:'4px',mouthColor:'#d85a30',
    waveVisible:false,
    dotColor:'#d85a30',
    statusText:'✦ Generating your poster',
    q:'✦ Poster generating — based on everything you just told me...',
    eyeAnim:'revealEye 1s ease-in-out infinite',
    mouthAnim:'none'
  }
};

let currentState = 'idle';
let stateOrder = ['idle','listen','think','speak','reveal'];

function setState(s) {
  currentState = s;
  const st = states[s];
  const isLight = document.getElementById('stage').classList.contains('light-mode');
  const gold = isLight ? '#6b4e1a' : '#c8a55a';

  // Pills
  document.querySelectorAll('.state-pill').forEach(p => p.classList.remove('active'));
  document.getElementById(st.pill).classList.add('active');

  // Eyes
  const eyes = document.querySelectorAll('.eye');
  eyes.forEach(e => {
    e.style.width = st.eyeW;
    e.style.height = st.eyeH;
    e.style.borderRadius = st.eyeRadius;
    e.style.background = st.eyeColor || gold;
    e.style.animation = st.eyeAnim || 'eyeBlink 4s ease-in-out infinite';
  });

  // Mouth
  const mouth = document.getElementById('mouth');
  mouth.style.width = st.mouthW;
  mouth.style.height = st.mouthH;
  mouth.style.borderRadius = st.mouthRadius;
  mouth.style.background = st.mouthColor || gold;

  // Waveform
  const wave = document.getElementById('waveWrap');
  wave.classList.toggle('visible', st.waveVisible);
  if (st.waveColor) {
    wave.querySelectorAll('.wbar').forEach(b => b.style.background = st.waveColor);
  } else {
    wave.querySelectorAll('.wbar').forEach(b => b.style.background = isLight ? '#6b4e1a' : '#c8a55a');
  }

  // Status
  document.getElementById('statusDot').style.background = st.dotColor;
  document.getElementById('statusText').textContent = st.statusText;

  // Question — typewrite
  typeWrite(st.q);
}

function typeWrite(text) {
  const el = document.getElementById('qText');
  el.innerHTML = '<span class="q-cursor"></span>';
  let i = 0;
  const cursor = el.querySelector('.q-cursor');
  const interval = setInterval(() => {
    if (i < text.length) {
      el.insertBefore(document.createTextNode(text[i]), cursor);
      i++;
    } else {
      clearInterval(interval);
    }
  }, 22);
}

function cycleState() {
  const idx = stateOrder.indexOf(currentState);
  const next = stateOrder[(idx + 1) % stateOrder.length];
  setState(next);
}

let lightMode = false;
function toggleMode() {
  lightMode = !lightMode;
  const stage = document.getElementById('stage');
  stage.classList.toggle('light-mode', lightMode);
  document.getElementById('modeBtn').textContent = lightMode ? '☽ Dark' : '☀ Light';
  setState(currentState);
}

// Add mouthTalk + revealEye keyframes dynamically
const ks = document.createElement('style');
ks.textContent = `
@keyframes mouthTalk{0%,100%{height:10px}50%{height:16px;border-radius:8px}}
@keyframes revealEye{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.15);opacity:0.7}}
`;
document.head.appendChild(ks);
</script>
